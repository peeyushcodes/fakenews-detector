name: fakenews-detector
version: "1.0.0"
description: >
  An OpenEnv environment where AI agents must fact-check news claims,
  assign verdicts (true/false/misleading/unverifiable), provide structured
  reasoning, and cite evidence. Designed to evaluate LLM critical thinking,
  media literacy, and resistance to misinformation at 3 difficulty levels.

author: OpenEnv Hackathon Submission
tags: [openenv, fact-checking, misinformation, nlp, media-literacy]

tasks:
  - name: obvious_fake
    difficulty: easy
    description: Identify clearly fabricated or satirical news claims (score 0.2-0.3 difficulty)
    max_steps: 3
    expected_score_random: 0.15
    expected_score_good_agent: 0.85

  - name: subtle_misinfo
    difficulty: medium
    description: Detect partially true but misleading or out-of-context claims (score 0.6-0.7 difficulty)
    max_steps: 4
    expected_score_random: 0.10
    expected_score_good_agent: 0.70

  - name: complex_claim
    difficulty: hard
    description: >
      Evaluate nuanced scientific, economic, or political claims requiring
      deep domain knowledge and multi-step reasoning (score 0.75-0.9 difficulty)
    max_steps: 5
    expected_score_random: 0.05
    expected_score_good_agent: 0.60

observation_space:
  type: object
  fields:
    claim:
      type: string
      description: The news claim to fact-check
    context:
      type: string
      description: Additional context or article snippet providing background
    source:
      type: string
      description: The claimed source of the news item
    task_name:
      type: string
      description: Current task identifier
    step:
      type: integer
      description: Current step number within episode
    max_steps:
      type: integer
      description: Maximum steps allowed for this task
    previous_feedback:
      type: string
      nullable: true
      description: Feedback from the previous step if available

action_space:
  type: object
  fields:
    verdict:
      type: string
      enum: [true, false, misleading, unverifiable]
      description: The agent's fact-check verdict on the claim
    confidence:
      type: float
      range: [0.0, 1.0]
      description: Agent's confidence in their verdict
    reasoning:
      type: string
      min_words: 20
      description: Detailed explanation of the verdict
    key_evidence:
      type: array
      items: string
      min_items: 2
      max_items: 4
      description: Key evidence points supporting the verdict

reward:
  range: [0.0, 1.0]
  type: continuous
  description: Partial reward for each step based on verdict accuracy, confidence calibration, reasoning quality, and evidence quality
  components:
    verdict_correct:
      weight: 0.40
      description: Whether the verdict matches ground truth
    confidence_appropriate:
      weight: 0.20
      description: Whether confidence is well-calibrated to difficulty and correctness
    reasoning_quality:
      weight: 0.25
      description: Depth and accuracy of reasoning (scored by word count + key term matching)
    evidence_quality:
      weight: 0.15
      description: Number and validity of evidence points provided

endpoints:
  reset:
    method: POST
    path: /reset
    body: '{"task_name": "obvious_fake"}'
  step:
    method: POST
    path: /step
    body: '{"task_name": "obvious_fake", "verdict": "false", "confidence": 0.9, "reasoning": "...", "key_evidence": ["...", "..."]}'
  state:
    method: GET
    path: /state
  health:
    method: GET
    path: /health
